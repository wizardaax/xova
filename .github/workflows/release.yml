name: Build and Release

# Triggered by:
#   - Pushing a v* tag (e.g. `git tag v0.1.1 && git push --tags`) — builds + uploads
#   - Manual workflow_dispatch — builds, no upload (smoke-test)
#
# What it does:
#   On a fresh Windows runner, npm ci + npm run tauri build, producing:
#     app/src-tauri/target/release/bundle/msi/Xova_<ver>_x64_en-US.msi
#     app/src-tauri/target/release/bundle/nsis/Xova_<ver>_x64-setup.exe
#   On a tag push, those installers are attached to the matching GitHub
#   release using softprops/action-gh-release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # needed to create / update releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: npx tauri build

      - name: List built artefacts
        if: always()
        run: |
          Get-ChildItem -Path app/src-tauri/target/release/bundle -Recurse -File | ForEach-Object { "{0,12} {1}" -f $_.Length, $_.FullName }
        shell: pwsh

      - name: Upload installers to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Xova ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
